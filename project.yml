name: Mintzo
options:
  bundleIdPrefix: eus.mintzo
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: "0.1.3"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 3.0.0
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

targets:
  Mintzo:
    type: application
    platform: macOS
    sources:
      - Sources/Mintzo
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: MintzoCore
      - framework: Vendor/whisper.xcframework
        embed: true
      - framework: Vendor/llama.xcframework
        embed: true
      - package: KeyboardShortcuts
    info:
      path: Sources/Mintzo/Info.plist
      properties:
        CFBundleDisplayName: Mintzo
        CFBundleIconFile: AppIcon
        LSUIElement: true
        # Déclare l'app comme localisée fr/eu/en : macOS rend alors le menu
        # standard (À propos / Réglages / Services / Masquer / Quitter…) dans sa
        # propre traduction française ou anglaise selon la langue système —
        # sans course de timing. L'euskara (non fourni par AppKit) est pris en
        # charge par MainMenuLocalizer.
        CFBundleLocalizations:
          - fr
          - eu
          - en
        NSMicrophoneUsageDescription: "Mintzo utilise le microphone pour transcrire votre voix en texte, localement sur votre Mac."
    entitlements:
      path: Sources/Mintzo/Mintzo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eus.mintzo.Mintzo
    scheme:
      testTargets:
        - MintzoCoreTests

  MintzoCore:
    type: framework
    platform: macOS
    sources:
      - Sources/MintzoCore
    dependencies:
      - framework: Vendor/whisper.xcframework
        embed: false
      - framework: Vendor/llama.xcframework
        embed: false
      - package: KeyboardShortcuts
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eus.mintzo.MintzoCore
    scheme:
      testTargets:
        - MintzoCoreTests

  MintzoCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/MintzoCoreTests
    dependencies:
      - target: MintzoCore
      - framework: Vendor/whisper.xcframework
        embed: true
      - framework: Vendor/llama.xcframework
        embed: true
