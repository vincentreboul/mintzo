<!doctype html>
<html lang="eu">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFFFFF" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171614" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta property="og:site_name" content="Mintzo" />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="https://mintzo.vercel.app/screenshots/window-eu-light.png" />
		<meta property="og:image:width" content="1520" />
		<meta property="og:image:height" content="1224" />
		<meta name="twitter:card" content="summary_large_image" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/fraunces-latin-opsz-normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/literata-latin-opsz-normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
